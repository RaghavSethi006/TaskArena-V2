name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v2.0.8)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: "deb rpm"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows backend bundle
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: taskarena-v2
        run: |
          $ErrorActionPreference = "Stop"
          $pythonVersion = "3.10.11"
          $embedUrl = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip"
          $embedZip = "python-embed.zip"
          $embedDir = "python-embed"
          $bundleDir = "frontend\src-tauri\binaries\backend-bundle"
          $sitePackagesDir = Join-Path $embedDir "Lib\site-packages"

          if (Test-Path $embedDir) {
            Remove-Item $embedDir -Recurse -Force
          }
          if (Test-Path $bundleDir) {
            Remove-Item $bundleDir -Recurse -Force
          }
          if (Test-Path $embedZip) {
            Remove-Item $embedZip -Force
          }

          Invoke-WebRequest -Uri $embedUrl -OutFile $embedZip -UseBasicParsing
          Expand-Archive $embedZip -DestinationPath $embedDir -Force
          Remove-Item $embedZip -Force

          $pthFile = Get-ChildItem "$embedDir\python*._pth" | Select-Object -First 1
          if (-not $pthFile) {
            throw "Could not find the embeddable Python ._pth file."
          }

          $pthLines = Get-Content $pthFile.FullName
          $updatedPthLines = foreach ($line in $pthLines) {
            if ($line -match "^#import site") {
              "import site"
            } else {
              $line
            }
          }
          if ($updatedPthLines -notcontains ".") {
            $updatedPthLines += "."
          }
          Set-Content -Path $pthFile.FullName -Value ($updatedPthLines -join "`n") -NoNewline

          New-Item -ItemType Directory -Force -Path $sitePackagesDir | Out-Null

          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py" -UseBasicParsing
          & "$embedDir\python.exe" "get-pip.py" --no-warn-script-location
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install pip into the embeddable runtime."
          }
          Remove-Item "get-pip.py" -Force

          & "$embedDir\python.exe" -m pip install --requirement requirements-ci.txt --target $sitePackagesDir --no-warn-script-location
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install requirements-ci.txt into the embeddable runtime."
          }

          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "$embedDir\*" $bundleDir -Recurse -Force
          Copy-Item "sidecar" "$bundleDir\sidecar" -Recurse -Force
          Copy-Item "backend" "$bundleDir\backend" -Recurse -Force
          Copy-Item "features" "$bundleDir\features" -Recurse -Force
          Copy-Item "shared" "$bundleDir\shared" -Recurse -Force
          Copy-Item "alembic" "$bundleDir\alembic" -Recurse -Force
          Copy-Item "alembic.ini" "$bundleDir\alembic.ini" -Force
          Copy-Item ".env.example" "$bundleDir\.env" -Force

          Get-ChildItem $bundleDir -Recurse -Directory -Filter "__pycache__" |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem $bundleDir -Recurse -File -Filter "*.pyc" |
            Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        if: matrix.os != 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: taskarena-v2/requirements-ci.txt

      - name: Install macOS build dependencies
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Install Python build dependencies
        if: matrix.os != 'windows-latest'
        working-directory: taskarena-v2
        run: pip install -r requirements-ci.txt pyinstaller

      - name: Build Mac/Linux backend bundle
        if: matrix.os != 'windows-latest'
        working-directory: taskarena-v2
        run: |
          pyinstaller taskarena-backend.spec --clean --noconfirm
          BUNDLE_DIR="frontend/src-tauri/binaries/backend-bundle"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR"
          cp -r dist/taskarena-backend/. "$BUNDLE_DIR/"
          chmod +x "$BUNDLE_DIR/taskarena-backend" 2>/dev/null || true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskarena-v2/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: taskarena-v2/frontend
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and release (Windows/macOS)
        if: matrix.os != 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: taskarena-v2/frontend
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "TaskArena ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: true
          args: --target ${{ matrix.target }}

      - name: Build and release (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: taskarena-v2/frontend
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "TaskArena ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: true
          args: --target ${{ matrix.target }} --bundles deb rpm

      - name: Create macOS app zip
        if: matrix.os == 'macos-latest'
        working-directory: taskarena-v2
        run: |
          APP_DIR="frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_PATH="$APP_DIR/TaskArena.app"
          ZIP_NAME="TaskArena-${{ github.event.inputs.tag || github.ref_name }}-aarch64.zip"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi

          cd "$APP_DIR"
          rm -f "$ZIP_NAME"
          ditto -c -k --sequesterRsrc --keepParent "TaskArena.app" "$ZIP_NAME"

      - name: Upload macOS app zip
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          files: taskarena-v2/frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/TaskArena-${{ github.event.inputs.tag || github.ref_name }}-aarch64.zip
