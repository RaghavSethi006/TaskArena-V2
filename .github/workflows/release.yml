name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v2.0.1"
        required: true
        type: string

jobs:
  build:
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install macOS build dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install cmake
        working-directory: taskarena-v2

      - name: Install Python dependencies
        env:
          CMAKE_ARGS: "-DLLAMA_METAL=OFF"
          FORCE_CMAKE: "1"
        run: pip install -r requirements.txt pyinstaller
        working-directory: taskarena-v2

      - name: Compile Python backend
        run: pyinstaller taskarena-backend.spec --clean --noconfirm
        working-directory: taskarena-v2

      - name: Copy backend to Tauri binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $triple = "${{ matrix.target }}"
          $dest = "frontend/src-tauri/binaries/taskarena-backend-$triple"
          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Copy-Item "dist/taskarena-backend" $dest -Recurse -Force
        working-directory: taskarena-v2

      - name: Copy backend to Tauri binaries (Mac/Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          DEST="frontend/src-tauri/binaries/taskarena-backend-${{ matrix.target }}"
          rm -rf "$DEST"
          mkdir -p "$(dirname "$DEST")"
          cp -r dist/taskarena-backend "$DEST"
          chmod -R +x "$DEST"
        working-directory: taskarena-v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskarena-v2/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: taskarena-v2/frontend

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: taskarena-v2/frontend
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "TaskArena ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          args: --target ${{ matrix.target }}
          releaseBody: |
            ## TaskArena ${{ env.RELEASE_TAG }}

            ### Download
            | Platform | File |
            |---|---|
            | Windows | `TaskArena_*_x64-setup.exe` |
            | Mac (Intel) | `TaskArena_*_x64.dmg` |
            | Mac (Apple Silicon) | `TaskArena_*_aarch64.dmg` |
            | Linux | `TaskArena_*_amd64.AppImage` |

            ### First time setup
            The app guides you through setup on first launch.
            Get a free Groq API key at https://console.groq.com/keys
            (takes 30 seconds, no credit card needed)
